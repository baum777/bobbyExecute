environments:
  - name: staging
    services:
      - type: web
        name: bobbyexecute-bot-staging
        runtime: node
        plan: starter
        region: oregon
        branch: main
        autoDeployTrigger: commit
        rootDir: bot
        buildCommand: npm ci && npm run build
        startCommand: npm run start:server
        healthCheckPath: /health
        envVars:
          - key: NODE_ENV
            value: production
          - key: HOST
            value: 0.0.0.0
          - key: RUNTIME_CONFIG_ENV
            value: staging
          - key: LIVE_TRADING
            value: "false"
          - key: DRY_RUN
            value: "true"
          - key: TRADING_ENABLED
            value: "false"
          - key: LIVE_TEST_MODE
            value: "false"
          - key: RUNTIME_POLICY_AUTHORITY
            value: ts-env
          - key: REVIEW_POLICY_MODE
            value: required
          - key: RPC_MODE
            value: stub
          - key: MAX_SLIPPAGE_PERCENT
            value: "5"
          - key: CIRCUIT_BREAKER_FAILURE_THRESHOLD
            value: "5"
          - key: CIRCUIT_BREAKER_RECOVERY_MS
            value: "60000"
          - key: DASHBOARD_ORIGIN
            fromService:
              type: web
              name: bobbyexecute-dashboard-staging
              envVarKey: RENDER_EXTERNAL_URL
          - key: DATABASE_URL
            fromDatabase:
              name: bobbyexecute-postgres-staging
              property: connectionString

      - type: pserv
        name: bobbyexecute-control-staging
        runtime: node
        plan: starter
        region: oregon
        branch: main
        autoDeployTrigger: commit
        rootDir: bot
        buildCommand: npm ci && npm run build
        startCommand: npm run start:control
        healthCheckPath: /health
        envVars:
          - key: NODE_ENV
            value: production
          - key: RUNTIME_CONFIG_ENV
            value: staging
          - key: CONTROL_TOKEN
            sync: false
          - key: CONTROL_RESTARTS_ENABLED
            value: "true"
          - key: CONTROL_RESTART_COOLDOWN_MS
            value: "300000"
          - key: CONTROL_RESTART_CONVERGENCE_TIMEOUT_MS
            value: "600000"
          - key: CONTROL_RESTART_ALERT_NOTIFICATION_COOLDOWN_MS
            value: "300000"
          - key: CONTROL_RESTART_ALERT_WEBHOOK_TIMEOUT_MS
            value: "5000"
          - key: CONTROL_RESTART_ALERT_WEBHOOK_REQUIRED
            value: "true"
          - key: WORKER_SERVICE_NAME
            value: bobbyexecute-runtime-staging
          - key: WORKER_DEPLOY_HOOK_URL
            sync: false
          - key: CONTROL_RESTART_ALERT_WEBHOOK_URL
            sync: false
          - key: CONTROL_RESTART_ALERT_WEBHOOK_TOKEN
            sync: false
          - key: DATABASE_URL
            fromDatabase:
              name: bobbyexecute-postgres-staging
              property: connectionString
          - key: REDIS_URL
            fromService:
              type: keyvalue
              name: bobbyexecute-kv-staging
              property: connectionString

      - type: worker
        name: bobbyexecute-runtime-staging
        runtime: node
        plan: starter
        region: oregon
        branch: main
        autoDeployTrigger: commit
        rootDir: bot
        buildCommand: npm ci && npm run build
        startCommand: npm run start:worker
        envVars:
          - key: NODE_ENV
            value: production
          - key: RUNTIME_CONFIG_ENV
            value: staging
          - key: LIVE_TRADING
            value: "false"
          - key: DRY_RUN
            value: "true"
          - key: TRADING_ENABLED
            value: "false"
          - key: LIVE_TEST_MODE
            value: "false"
          - key: RUNTIME_POLICY_AUTHORITY
            value: ts-env
          - key: REVIEW_POLICY_MODE
            value: required
          - key: RPC_MODE
            value: stub
          - key: MAX_SLIPPAGE_PERCENT
            value: "5"
          - key: CIRCUIT_BREAKER_FAILURE_THRESHOLD
            value: "5"
          - key: CIRCUIT_BREAKER_RECOVERY_MS
            value: "60000"
          - key: JOURNAL_PATH
            value: /var/data/journal.jsonl
          - key: WORKER_HEARTBEAT_INTERVAL_MS
            value: "5000"
          - key: DATABASE_URL
            fromDatabase:
              name: bobbyexecute-postgres-staging
              property: connectionString
          - key: REDIS_URL
            fromService:
              type: keyvalue
              name: bobbyexecute-kv-staging
              property: connectionString
        disk:
          name: bobbyexecute-runtime-staging-data
          mountPath: /var/data
          sizeGB: 10

      - type: web
        name: bobbyexecute-dashboard-staging
        runtime: node
        plan: starter
        region: oregon
        branch: main
        autoDeployTrigger: commit
        rootDir: dashboard
        buildCommand: npm ci && npm run build
        startCommand: npm run start
        healthCheckPath: /
        envVars:
          - key: NODE_ENV
            value: production
          - key: NEXT_PUBLIC_USE_MOCK
            value: "false"
          - key: DASHBOARD_SESSION_SECRET
            sync: false
          - key: DASHBOARD_OPERATOR_DIRECTORY_JSON
            sync: false
          - key: CONTROL_TOKEN
            sync: false
          - key: CONTROL_SERVICE_HOSTNAME
            fromService:
              type: pserv
              name: bobbyexecute-control-staging
              envVarKey: RENDER_INTERNAL_HOSTNAME
          - key: CONTROL_SERVICE_PORT
            fromService:
              type: pserv
              name: bobbyexecute-control-staging
              envVarKey: PORT
          - key: NEXT_PUBLIC_API_URL
            fromService:
              type: web
              name: bobbyexecute-bot-staging
              envVarKey: RENDER_EXTERNAL_URL

      - type: cron
        name: bobbyexecute-rehearsal-refresh-staging
        runtime: node
        plan: starter
        region: oregon
        branch: main
        autoDeployTrigger: commit
        rootDir: bot
        schedule: "0 3 * * *"
        buildCommand: npm ci && npm run build
        startCommand: npm run recovery:db-rehearse:render
        envVars:
          - key: NODE_ENV
            value: production
          - key: RUNTIME_CONFIG_ENV
            value: staging
          - key: REHEARSAL_EXECUTION_SOURCE
            value: automated
          - key: REHEARSAL_ORCHESTRATION_MODE
            value: render_cron
          - key: REHEARSAL_AUTOMATION_PROVIDER
            value: render
          - key: REHEARSAL_SOURCE_KIND
            value: canonical
          - key: REHEARSAL_TARGET_KIND
            value: disposable
          - key: REHEARSAL_SOURCE_CONTEXT
            value: canonical-staging
          - key: REHEARSAL_TARGET_CONTEXT
            value: disposable-rehearsal-staging
          - key: REHEARSAL_RENDER_SERVICE_NAME
            value: bobbyexecute-rehearsal-refresh-staging
          - key: REHEARSAL_CRON_SCHEDULE
            value: "0 3 * * *"
          - key: REHEARSAL_MIGRATIONS_DIR
            value: migrations
          - key: REHEARSAL_ACTOR_ID
            value: render-rehearsal-refresh-staging
          - key: REHEARSAL_ACTOR_DISPLAY_NAME
            value: Render rehearsal refresh
          - key: REHEARSAL_SESSION_ID
            value: render-cron-staging
          - key: SOURCE_DATABASE_URL
            fromDatabase:
              name: bobbyexecute-postgres-staging
              property: connectionString
          - key: TARGET_DATABASE_URL
            fromDatabase:
              name: bobbyexecute-postgres-rehearsal-staging
              property: connectionString

    databases:
      - name: bobbyexecute-postgres-staging
        databaseName: bobbyexecute_staging
        plan: free
        region: oregon
      - name: bobbyexecute-postgres-rehearsal-staging
        databaseName: bobbyexecute_rehearsal_staging
        plan: free
        region: oregon

    keyValueStores:
      - name: bobbyexecute-kv-staging
        plan: free
        region: oregon

