name: Chaos Pre-Merge Gate

on:
  pull_request:
  push:
    branches:
      - main
      - cursor/**

jobs:
  premerge-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run pre-merge gate (lint + golden + chaos)
        run: npm run premerge
